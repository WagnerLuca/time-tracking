services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      UseInMemoryDatabase: true
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:7000
      Serilog__WriteTo__1__Args__serverUrl: http://seq:5341
    ports:
      - "7000:7000"
    depends_on:
      - seq
  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #   environment:
  #     PORT: 3000
  #     HOST: 0.0.0.0
  #     NODE_ENV: production
  #   ports:
  #     - "3000:3000"
  seq:
    image: datalust/seq:latest
    environment:
      ACCEPT_EULA: Y
      SEQ_FIRSTRUN_NOAUTHENTICATION: true
    ports:
      - "5341:80"
    volumes:
      - seq_data:/data
    
volumes:
  db_data_dev:
  seq_data: