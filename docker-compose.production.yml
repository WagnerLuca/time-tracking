services:
  db:
    image: postgres:${POSTGRES_VERSION}
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql
    ports:
      - ${POSTGRES_PORT}:5432
    restart: unless-stopped
  seq:
    image: datalust/seq:${SEQ_VERSION}
    environment:
      ACCEPT_EULA: ${SEQ_ACCEPT_EULA}
      SEQ_FIRSTRUN_NOAUTHENTICATION: ${SEQ_NO_AUTH}
    ports:
      - ${SEQ_PORT}:80
    volumes:
      - seq_data:/data
  backend:
    image: ${BACKEND_IMAGE}
    environment:
      UseInMemoryDatabase: ${USE_INMEMORY_DB}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ASPNETCORE_URLS: http://+:${BACKEND_PORT}
      Serilog__WriteTo__1__Args__serverUrl: http://seq:80
      JwtSettings__Secret: ${JWT_SECRET}
      JwtSettings__AccessTokenExpiryMinutes: ${ACCESS_TOKEN_EXPIRY_MINUTES}
      Cors__AllowedOrigins_0: ${ALLOWED_ORIGINS}
    ports:
      - ${BACKEND_PORT}:${BACKEND_PORT}
      
  frontend:
    image: ${FRONTEND_IMAGE}
    environment:
      PORT: ${FRONTEND_PORT}
      HOST: ${FRONTEND_HOST}
      NODE_ENV: ${NODE_ENV}
      API_BASE_URL: ${API_BASE_URL}
    ports:
      - ${FRONTEND_PORT}:${FRONTEND_PORT}
    restart: unless-stopped
volumes:
  db_data: null
  seq_data: null